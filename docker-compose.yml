services:
  postgres:
    image: postgres:16
    container_name: quescade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quescade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quescade"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - quescade-postgres-data:/var/lib/postgresql/data

volumes:
  quescade-postgres-data:
